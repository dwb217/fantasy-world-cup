<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy World Cup</title>
  <style>
:root {
  --bg: #0d1117;
  --panel: #161b22;
  --panel-2: #1c232c;
  --border: #2a3340;
  --text: #e6edf3;
  --muted: #8b97a6;
  --accent: #2f81f7;
  --accent-2: #f7b32f;
  --green: #2ea043;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.4);
}

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 880px; margin: 0 auto; padding: 0 20px; }
.muted { color: var(--muted); }
.elim { text-decoration: line-through; color: var(--muted); text-decoration-thickness: 1.5px; }
.draft-bonus-row td { font-style: italic; color: var(--accent-2); }
.draft-bonus-note { margin-top: 12px; font-size: .82rem; line-height: 1.5; }
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-top: 14px; }
.data-card { border: 1px solid var(--border); border-radius: 10px; padding: 16px; background: var(--panel-2); display: flex; flex-direction: column; }
.data-card p { flex: 1; font-size: .85rem; line-height: 1.5; }
.csv-btn { align-self: flex-start; }
code { background: var(--panel-2); padding: 1px 6px; border-radius: 6px; font-size: .9em; }

/* header */
.site-header {
  background: linear-gradient(135deg, #14213d 0%, #0d1117 60%);
  border-bottom: 1px solid var(--border);
  padding: 28px 0 24px;
}
.site-header h1 { margin: 0; font-size: 1.9rem; letter-spacing: -.5px; }
.tagline { margin: 6px 0 0; color: var(--muted); font-size: .95rem; }

/* tabs */
.tabs-bar {
  position: sticky; top: 0; z-index: 5;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.tabs-bar .wrap { display: flex; gap: 4px; overflow-x: auto; }
.tab {
  background: none; border: none; color: var(--muted);
  padding: 14px 16px; font-size: .95rem; cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }

main { padding: 24px 0 60px; }

/* standings */
.standing-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
  box-shadow: var(--shadow);
}
.standing-head {
  width: 100%; display: grid;
  grid-template-columns: 34px 1fr auto auto 20px;
  align-items: center; gap: 12px;
  background: none; border: none; color: var(--text);
  padding: 14px 16px; cursor: pointer; text-align: left;
}
.standing-head:hover { background: var(--panel-2); }
.standing-head .rank {
  display: grid; place-items: center;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--panel-2); color: var(--muted); font-weight: 700; font-size: .85rem;
}
.standing-card:nth-child(2) .rank { background: #c9a227; color: #1a1a1a; } /* gold-ish for leader (first card is intro) */
.standing-head .name { font-weight: 600; font-size: 1.05rem; }
.standing-head .sub { font-size: .82rem; }
.standing-head .pts { font-size: 1.3rem; font-weight: 700; color: var(--accent-2); }
.standing-head .pts small { font-size: .6rem; color: var(--muted); margin-left: 3px; font-weight: 500; }
.standing-head .chev { color: var(--muted); transition: transform .15s; }
.standing-card.open .chev { transform: rotate(180deg); }
.standing-body { display: none; padding: 0 16px 14px; }
.standing-card.open .standing-body { display: block; }

/* tables */
table { width: 100%; border-collapse: collapse; }
table.mini { font-size: .9rem; }
table th { text-align: left; color: var(--muted); font-weight: 500; font-size: .8rem; padding: 8px 6px; border-bottom: 1px solid var(--border); }
table td { padding: 7px 6px; border-bottom: 1px solid var(--border); }
table tr:last-child td { border-bottom: none; }
.num { text-align: right; }
table th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
table th.sortable:hover { color: var(--text); }
table th.sorted { color: var(--text); }
table.full {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
table.full th, table.full td { padding: 11px 14px; }

/* matches */
.match-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 10px;
}
.match-meta { display: flex; justify-content: space-between; align-items: center; font-size: .8rem; margin-bottom: 8px; }
.stage { font-size: .72rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
.stage.group { background: #1f2d3d; color: #69a7ff; }
.stage.knockout { background: #3a2a14; color: var(--accent-2); }
.match-line { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
.match-line .t { font-weight: 600; }
.match-line .t.right { text-align: right; }
.match-line .score { font-variant-numeric: tabular-nums; font-weight: 700; padding: 2px 10px; background: var(--panel-2); border-radius: 8px; white-space: nowrap; }
.badge { background: var(--green); color: #fff; font-size: .72rem; padding: 1px 6px; border-radius: 6px; font-weight: 600; }
.unowned { color: var(--muted); font-weight: 500; }

/* rules */
.rules ul { list-style: none; padding: 0; }
.rules li { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; }
.rules li b { color: var(--green); margin-right: 8px; }

/* form */
.form-wrap .grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0;
}
.form-wrap label { display: flex; flex-direction: column; gap: 5px; font-size: .85rem; color: var(--muted); }
.form-wrap label.num-in { max-width: 120px; }
.form-wrap input, .form-wrap select {
  background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  padding: 9px 11px; border-radius: 8px; font-size: .95rem;
}
.form-wrap input:focus, .form-wrap select:focus { outline: none; border-color: var(--accent); }
.ko-extra { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; padding: 12px 0; }
.ko-extra .check { flex-direction: row; align-items: center; gap: 8px; color: var(--text); }
.hidden { display: none !important; }
.actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
.btn {
  background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: .9rem; font-weight: 500;
}
.btn:hover { border-color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { filter: brightness(1.1); }
.btn.ghost { background: none; color: var(--muted); }
.btn.tiny { padding: 4px 10px; font-size: .8rem; }
.form-msg { min-height: 1.2em; font-size: .9rem; }
.form-msg.ok { color: var(--green); }
.form-msg.err { color: #f85149; }
.session-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .9rem; }

.site-footer { border-top: 1px solid var(--border); padding: 20px 0; font-size: .85rem; }

/* auto-update status bar */
.update-status {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  margin-top: 12px; font-size: .85rem; color: var(--text);
}
.update-status .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 0 0 rgba(46,160,67,.6); animation: pulse 2s infinite;
}
.update-status b { font-variant-numeric: tabular-nums; }
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(46,160,67,.5); }
  70% { box-shadow: 0 0 0 6px rgba(46,160,67,0); }
  100% { box-shadow: 0 0 0 0 rgba(46,160,67,0); }
}

/* editable results table */
.edit-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 14px; }
.results-table th, .results-table td { padding: 9px 10px; font-size: .9rem; vertical-align: middle; }
.results-table .owner { font-size: .75rem; display: block; }
.results-table .badge { background: var(--green); color: #fff; }
.edited { color: var(--accent-2); cursor: help; }

.score-cell .edit-score { display: none; gap: 4px; }
.score-cell .edit-score input { width: 44px; padding: 5px 6px; text-align: center;
  background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; }
.ko-cell .check { display: none; align-items: center; gap: 4px; margin-right: 10px; font-size: .82rem; color: var(--text); }
.ko-cell .check select { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 3px 5px; }

/* edit mode toggles read-only vs inputs */
.results-wrap.editing .score-cell .ro-score { display: none; }
.results-wrap.editing .score-cell .edit-score { display: inline-flex; }
.results-wrap.editing .ko-cell .check { display: inline-flex; }
.results-wrap.editing .ko-cell .ro-ko { display: none; }

/* title odds over time (projections tab) */
.odds-legend { display: flex; flex-wrap: wrap; gap: 6px 16px; margin: 4px 0 10px; font-size: .82rem; color: var(--muted); }
.odds-key { display: inline-flex; align-items: center; gap: 6px; }
.odds-swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
.odds-chart { margin-bottom: 18px; }
.odds-ctrl { margin: 2px 0 10px; }
.odds-ctrl-label { font-size: .82rem; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
.odds-pos-select { font: inherit; font-size: .82rem; color: var(--text); background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; cursor: pointer; }
.chart-tip { position: absolute; pointer-events: none; z-index: 5; min-width: 128px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); padding: 7px 9px; font-size: .78rem; color: var(--text); }
.chart-tip .tip-date { font-weight: 600; color: var(--muted); margin-bottom: 5px; font-size: .74rem; }
.chart-tip .tip-row { display: flex; align-items: center; gap: 6px; line-height: 1.5; }
.chart-tip .tip-row .tip-name { flex: 1; }
.chart-tip .tip-row b { font-variant-numeric: tabular-nums; }

/* draft value tab */
.value-podium { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 8px; }
@media (max-width: 640px) { .value-podium { grid-template-columns: 1fr; } }
.value-col .value-chip { display: flex; align-items: center; justify-content: space-between; gap: 8px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 10px; margin-bottom: 6px; font-size: .88rem; }
.value-chip.steal b { color: var(--green); }
.value-chip.bust b { color: #f85149; }
.value-pos { color: var(--green); }
.value-neg { color: #f85149; }
.value table { margin-bottom: 22px; }

/* per-manager points in the results table */
.results-table .pts-cell { white-space: nowrap; }
.results-table .pts-owner { display: inline-flex; align-items: center; gap: 4px;
  font-size: .76rem; color: var(--muted); }
.results-table .pts-owner + .pts-owner { margin-left: 10px; }

/* upcoming fixtures: listed but not yet scored */
.results-table tr.upcoming td { opacity: .6; }
.results-wrap.editing .results-table tr.upcoming td { opacity: 1; }

/* manual match entry (backup if the auto-import misses a game) — edit mode only */
.add-bar { display: none; flex-direction: column; gap: 8px; margin-top: 16px; padding: 12px 14px;
  background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; }
.results-wrap.editing .add-bar { display: flex; }
.add-title { font-size: .88rem; }
.add-fields { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
.add-fields select, .add-fields input { background: var(--panel); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 6px 8px; font-size: .88rem; }
.add-fields input[type="number"] { width: 52px; text-align: center; }
.rm-btn { display: none; background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 6px; cursor: pointer; padding: 1px 7px; margin-left: 6px; font-size: .8rem; }
.rm-btn:hover { color: #f85149; border-color: #f85149; }
.results-wrap.editing .rm-btn { display: inline-block; }

.save-bar { display: none; align-items: center; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
.results-wrap.editing .save-bar { display: flex; }
.save-bar .pw { display: flex; flex-direction: column; gap: 4px; font-size: .8rem; color: var(--muted); }
.save-bar .pw input { background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 10px; border-radius: 8px; }

/* per-game fantasy points */
.gp-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
}
.gp-head {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 11px 14px; background: var(--panel-2); border-bottom: 1px solid var(--border);
}
.gp-score { font-size: .95rem; }
.gp-score b { font-variant-numeric: tabular-nums; }
.gp-date { margin-left: auto; font-size: .82rem; }
.gp-row {
  display: grid; grid-template-columns: minmax(150px, 220px) 1fr auto;
  align-items: center; gap: 12px; padding: 10px 14px;
}
.gp-row + .gp-row { border-top: 1px solid var(--border); }
.gp-owner { display: flex; flex-direction: column; gap: 1px; }
.gp-mgr { font-weight: 700; }
.gp-owner .muted { font-size: .8rem; }
.gp-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.gp-chip {
  background: var(--panel-2); border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 10px; font-size: .78rem; white-space: nowrap;
}
.gp-chip b { color: var(--green); }
.gp-total .badge { background: var(--green); color: #fff; font-size: .9rem; padding: 3px 9px; }

/* projections */
.proj-h { margin: 28px 0 4px; font-size: 1.05rem; }
.proj-h:first-of-type { margin-top: 8px; }
.proj-sub { font-size: .82rem; margin: 0 0 12px; }
.proj-intro { margin-bottom: 8px; }
.lg-median { color: var(--accent); font-weight: 700; }
.lg-mean { color: var(--accent-2); font-weight: 700; }
svg.chart { width: 100%; display: block; }

/* box-plot standings */
.boxplots {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 6px 14px; box-shadow: var(--shadow);
}
.bp-row {
  display: grid; grid-template-columns: 26px minmax(96px, 150px) 1fr 64px;
  align-items: center; gap: 10px; padding: 8px 0;
}
.bp-row + .bp-row { border-top: 1px solid var(--border); }
.bp-rank {
  display: grid; place-items: center; width: 24px; height: 24px; border-radius: 50%;
  background: var(--panel-2); color: var(--muted); font-weight: 700; font-size: .8rem;
}
.bp-row:first-child .bp-rank { background: #c9a227; color: #1a1a1a; }
.bp-name { font-weight: 600; display: flex; flex-direction: column; line-height: 1.2; }
.bp-name .muted { font-size: .72rem; font-weight: 400; }
.bp-chart { height: 30px; }
.bp-val { text-align: right; font-weight: 700; color: var(--accent-2); font-variant-numeric: tabular-nums; }
.bp-val small { display: block; font-size: .62rem; color: var(--muted); font-weight: 500; }

/* finish heatmap */
.heat-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); background: var(--panel); }
table.heat { font-size: .85rem; min-width: 420px; }
table.heat th, table.heat td { padding: 9px 8px; text-align: center; border-bottom: 1px solid var(--border); }
table.heat th:first-child, table.heat td.heat-name { text-align: left; font-weight: 600; white-space: nowrap; }
table.heat tr:last-child td { border-bottom: none; }
.heat-cell { font-variant-numeric: tabular-nums; }
.heat-cell .muted { color: var(--muted); }

/* manager detail cards */
.proj-card .sub { font-size: .78rem; }
.proj-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin: 6px 0 16px; }
.proj-chart-box { min-width: 0; }
.chart-title { font-size: .82rem; margin-bottom: 6px; }
.chart-title .muted { font-size: .74rem; }
table.proj-teams { margin-top: 4px; }
table.proj-teams td, table.proj-teams th { padding: 6px 6px; }
.spark-cell { display: flex; align-items: center; gap: 6px; }
svg.spark { width: 78px; height: 22px; flex: none; }
.spark-cell .lam { font-size: .78rem; font-variant-numeric: tabular-nums; }
.proj-foot { font-size: .78rem; margin-top: 22px; line-height: 1.6; }

@media (max-width: 560px) {
  .standing-head { grid-template-columns: 30px 1fr auto 18px; }
  .standing-head .sub { display: none; }
  .results-table { font-size: .8rem; }
  .gp-row { grid-template-columns: 1fr auto; }
  .gp-chips { grid-column: 1 / -1; }
  .proj-charts { grid-template-columns: 1fr; }
  .proj-card .standing-head { grid-template-columns: 30px 1fr auto 18px; }
}

/* ---------- commentary blog ---------- */
.commentary .post {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
}
.commentary .post-headline { margin: 0 0 2px; font-size: 1.15rem; }
.commentary .post-meta { margin: 0 0 12px; font-size: .8rem; }
.commentary .post p { line-height: 1.6; margin: 0 0 10px; }
.commentary .post p:last-child { margin-bottom: 0; }

</style>
<style>.edit-bar,.save-bar,.add-bar,#update-status{display:none!important}</style>

<body>
  <header class="site-header">
    <div class="wrap">
      <h1>🏆 Fantasy World Cup</h1>
      <p class="tagline">2026 World Cup · final archive · MIKE, champion</p>
      <div id="update-status" class="update-status"></div>
    </div>
  </header>

  <nav class="tabs-bar"><div class="wrap" id="tabs"></div></nav>

  <main class="wrap">
    <div id="panel"></div>
  </main>

  <footer class="site-footer">
    <div class="wrap muted">
      Final archive of the 2026 Fantasy World Cup draft league. Congratulations, Mike.
    </div>
  </footer>

  <!-- data first, then the app -->
  <script>
// Draft results: each manager owns a set of national teams.
// Edit here if the draft ever changes.
window.DRAFT = {
  BRETT:   ["Netherlands", "Belgium", "Croatia", "Japan", "Australia", "Panama"],
  JOHN:  ["Spain", "Germany", "Turkey", "Sweden", "DR Congo"],
  GREGORY: ["Brazil", "Colombia", "South Korea", "Algeria", "Czechia", "Tunisia", "Qatar", "Saudi Arabia", "Ghana", "Haiti"],
  MIKE:    ["USA", "Uruguay", "Switzerland", "Austria", "Egypt", "Canada", "Norway", "Scotland", "Iraq"],
  DAVID:  ["Argentina", "Morocco", "Senegal", "Ivory Coast", "Bosnia & Herz"],
  KYLE:    ["England", "Mexico", "Ecuador", "Paraguay", "Uzbekistan", "South Africa", "Jordan", "Cape Verde", "Curacao"],

};

</script>
  <script>
// Scoring rules — these are applied to every owned national team, per match.
// The labels here are used both for display and by the scoring engine.
window.RULES = {
  win:        { points: 6, label: "Win" },
  draw:       { points: 2, label: "Draw (group stage only)" },
  cleanSheet: { points: 1, label: "Clean sheet" },
  twoGoals:   { points: 1, label: "Scored 2+ goals" },
  fourGoals:  { points: 1, label: "Scored 4+ goals" },
  winByTwo:   { points: 1, label: "Won by 2+ goals" },
  extraTime:  { points: 1, label: "Reached extra time (knockout)" },
  penalties:  { points: 1, label: "Reached penalties (knockout)" },
};

// Knockout rule: there are NO draws in the knockout round. The team that
// advances (higher score, or the shootout winner if level after extra time)
// gets the Win points; the other team gets 0 for the win/draw category.

</script>
  <script>
// Single source of truth for the team-strength model, shared by BOTH Monte-Carlo
// engines — the projections build (scripts/build_projections.js) and the What-If
// tab (app.js) — so the two can never drift apart. Tweak ratings here only.
//
// Goal model: a team's expected goals vs an opponent is
//   lambda(a, b) = MU * exp(K * (rating[a] - rating[b]) / 400)
// sampled as Poisson. A level knockout game adds extra-time goals at ET× the
// rate, then (if still level) a shootout decided by the Elo win probability
//   1 / (1 + 10^((rating[b] - rating[a]) / 400)).
window.RATINGS = {
  // Elo-ish base ratings (~2026 form).
  base: {
    France:2080, Spain:2075, Argentina:2065, Brazil:2050, England:2045,
    Portugal:2010, Netherlands:2000, Germany:1990, Belgium:1955, Croatia:1930,
    Uruguay:1930, Morocco:1925, Colombia:1910, Japan:1875, Switzerland:1865,
    USA:1860, Senegal:1855, Mexico:1840, Ecuador:1830, Turkey:1830,
    Austria:1820, Norway:1820, "South Korea":1810, Iran:1800, Egypt:1790,
    Sweden:1790, "Ivory Coast":1790, Algeria:1780, Canada:1770, Czechia:1760,
    Australia:1750, Paraguay:1750, Ghana:1740, Scotland:1740, "Bosnia & Herz":1740,
    "DR Congo":1730, Tunisia:1720, "South Africa":1710, Panama:1700, Qatar:1700,
    "Saudi Arabia":1700, Uzbekistan:1690, Iraq:1660, Jordan:1650, "Cape Verde":1630,
    "New Zealand":1620, Curacao:1580, Haiti:1560,
  },
  // Floor calibration: push the genuine minnows down toward realistic Elo so the
