name: Update projections

# Re-runs the Monte-Carlo projections once a day (10:00 UTC — after the last
# games of the previous day in North America have finished), conditioned on
# the results that have come in. Refreshes scores first so the projection sees
# the latest data, then commits both generated files.

on:
  schedule:
    - cron: "0 10 * * *" # daily at 10:00 UTC
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

# Shares a queue with the update-scores workflow so the two never push at once.
concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Fetch latest results
        env:
          SPORTSDB_KEY: ${{ secrets.SPORTSDB_KEY }}
          WC_SEASON: "2026"
        run: node scripts/fetch_scores.js

      - name: Rebuild projections
        run: node scripts/build_projections.js 20000

      - name: Commit changes if any
        run: |
          git config user.name "scores-bot"
          git config user.email "actions@github.com"
          if [[ -n "$(git status --porcelain data/matches.js data/projections.js data/odds_history.js)" ]]; then
            git add data/matches.js data/projections.js data/odds_history.js
            git commit -m "Update projections ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git pull --rebase
            git push
          else
            echo "No changes."
          fi
