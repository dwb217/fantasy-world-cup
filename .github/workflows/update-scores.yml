name: Update scores

# Imports results from TheSportsDB as soon as possible after full time. The
# job wakes every 20 minutes, but scripts/should_fetch.js only lets it call
# the API when an unscored match kicked off 2–7 hours ago — i.e. polling starts
# 2h after kickoff and retries every 20 min until the final score lands. When a
# fetch brings in a new result, the Monte-Carlo projections are rebuilt in the
# same run so odds update with the scores, and the commit triggers a Vercel
# deploy so the whole app refreshes automatically. The daily update-projections
# workflow handles the full refresh (fixture list, kickoff times, daily
# odds-history point).

on:
  schedule:
    - cron: "*/20 * * * *" # gated by scripts/should_fetch.js
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Decide whether to call the API
        id: gate
        run: |
          # Manual runs always fetch; the 10-minute cron only fetches when a
          # match may have just finished.
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "Forced run (manual trigger)."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=$(node scripts/should_fetch.js)" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch latest results
        if: steps.gate.outputs.run == 'true'
        env:
          # Optional: add a repository secret named SPORTSDB_KEY to use a
          # premium key. Falls back to the free "123" key if unset.
          SPORTSDB_KEY: ${{ secrets.SPORTSDB_KEY }}
          WC_SEASON: "2026"
        run: node scripts/fetch_scores.js

      - name: Check whether results changed
        id: diff
        if: steps.gate.outputs.run == 'true'
        run: |
          if [[ -n "$(git status --porcelain data/matches.js)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No score changes."
          fi

      # Only when a result actually came in — an unconditional rebuild would
      # commit Monte-Carlo noise on every gated run.
      - name: Rebuild projections on new results
        if: steps.diff.outputs.changed == 'true'
        run: node scripts/build_projections.js 20000

      - name: Commit changes if any
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "scores-bot"
          git config user.email "actions@github.com"
          if [[ -n "$(git status --porcelain data/matches.js data/projections.js data/odds_history.js)" ]]; then
            git add data/matches.js data/projections.js data/odds_history.js
            git commit -m "Update scores ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git pull --rebase
            git push
          else
            echo "Nothing to commit."
          fi
