name: Update scores

# Pulls the latest results from TheSportsDB every 4 hours and commits the
# regenerated data/matches.js. If the repo serves the site via GitHub Pages,
# the commit triggers a redeploy, so standings update automatically.

on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours (UTC)
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest results
        env:
          # Optional: add a repository secret named SPORTSDB_KEY to use a
          # premium key. Falls back to the free "123" key if unset.
          SPORTSDB_KEY: ${{ secrets.SPORTSDB_KEY }}
          WC_SEASON: "2026"
        run: node scripts/fetch_scores.js

      - name: Commit changes if any
        run: |
          git config user.name "scores-bot"
          git config user.email "actions@github.com"
          if [[ -n "$(git status --porcelain data/matches.js)" ]]; then
            git add data/matches.js
            git commit -m "Update scores ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "No score changes."
          fi
